const GRADES=[
  {min:20,max:20,emoji:'\ud83c\udfc6',grade:'Perfect!',    color:'#f59e0b',comment:'\u5168\u554f\u6b63\u89e3\uff01\u7d20\u6674\u3089\u3057\u3044\u3067\u3059\uff01'},
  {min:18,max:19,emoji:'\ud83c\udf1f',grade:'Excellent!',  color:'#22c55e',comment:'\u305d\u306e\u8abf\u5b50\u3067\u3053\u308c\u304b\u3089\u3082\u9811\u5f35\u308a\u307e\u3057\u3087\u3046\uff01'},
  {min:15,max:17,emoji:'\ud83d\udc4f',grade:'Very Good!',  color:'#3b82f6',comment:'\u5927\u5909\u3088\u304f\u3067\u304d\u307e\u3057\u305f\uff01\u3082\u3046\u5c11\u3057\u3067\u5b8c\u74a7\u3067\u3059\u3002'},
  {min:12,max:14,emoji:'\ud83d\udcaa',grade:'Good!',       color:'#60a5fa',comment:'\u826f\u3044\u3067\u3059\u3088\uff01\u5f15\u304d\u7d9a\u304d\u7df4\u7fd2\u3057\u307e\u3057\u3087\u3046\u3002'},
  {min:9, max:11,emoji:'\ud83d\udcda',grade:'Keep Going!', color:'#a855f7',comment:'\u3082\u3046\u4e00\u606f\uff01\u7e70\u308a\u8fd4\u3057\u3067\u5fc5\u305a\u4e0a\u9054\u3057\u307e\u3059\u3002'},
  {min:0, max:8, emoji:'\ud83d\udca1',grade:'Try Again!',  color:'#ef4444',comment:'\u3053\u308c\u304b\u3089\u3067\u3059\uff01\u3053\u306e\u8abf\u5b50\u3067\u9811\u5f35\u308a\u307e\u3057\u3087\u3046\u3002'},
];
function getGrade(n){return GRADES.find(g=>n>=g.min&&n<=g.max)||GRADES[GRADES.length-1];}
const ST={qs:[],cur:0,done:false,sc:{A:0,B:0,C:0,D:0},ok:0,ng:0,t0:Date.now()};
let _qtimer=null,_qsec=30;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
let _ae={};
function getAud(k){if(!_ae[k])_ae[k]=new Audio(MP3[k]);return _ae[k];}
let _ca=null;
function playClip(f,s,e){if(_ca)_ca.pause();const a=getAud(f);if(!a)return;a.currentTime=s;a.play();_ca=a;const st=()=>{if(a.currentTime>=e){a.pause();a.removeEventListener('timeupdate',st);}};a.addEventListener('timeupdate',st);}
function init(){
  const p={};['A','B','C','D'].forEach(s=>p[s]=shuffle(POOL.filter(q=>q.sec===s)).slice(0,5));
  ST.qs=shuffle([...p.A,...p.B,...p.C,...p.D]);
  ST.cur=0;ST.done=false;ST.sc={A:0,B:0,C:0,D:0};ST.ok=0;ST.ng=0;ST.t0=Date.now();
  document.getElementById('pf').style.width='0%';updateHdr();render();
}
function updateHdr(){
  const q=ST.qs[ST.cur];
  ['A','B','C','D'].forEach(s=>{const t=document.getElementById('tab-'+s);t.className='tab '+s+(q&&q.sec===s?' active':'');});
  document.getElementById('sc-ok').textContent=ST.ok;document.getElementById('sc-ng').textContent=ST.ng;
  document.getElementById('sc-pos').textContent=(ST.cur<20?ST.cur+1:20)+'/20\u554f';
  document.getElementById('pf').style.width=(Math.min(ST.cur,20)/20*100)+'%';
}
function startQTimer(q){
  stopQTimer();if(q.sec==='A')return;
  _qsec=30;updateQTimerUI(30);
  _qtimer=setInterval(()=>{_qsec--;updateQTimerUI(_qsec);if(_qsec<=0){stopQTimer();if(!ST.done){ST.done=true;ST.ng++;const q2=ST.qs[ST.cur];const i=document.getElementById('ai');if(i){i.disabled=true;i.classList.add('ng');}const sb=document.getElementById('sb');if(sb)sb.disabled=true;showFB(false,q2,true);}}},1000);
}
function stopQTimer(){clearInterval(_qtimer);_qtimer=null;}
function updateQTimerUI(sec){
  const bar=document.getElementById('qtbar'),num=document.getElementById('qtnum');if(!bar||!num)return;
  bar.style.width=(sec/30*100)+'%';num.textContent=sec+'s';
  const c=sec<=5?'danger':sec<=10?'warn':'';
  bar.className='qtimer-bar'+(c?' '+c:'');num.className='qtimer-num'+(c?' '+c:'');
}
const STYPE={A:'4\u62e9 | \u53e5\u52d5\u8a5e\u9078\u629e',B:'\u53e5\u52d5\u8a5e | \u9023\u8a9e\u88dc\u5145',C:'\u53e5\u52d5\u8a5e | \u8a00\u3044\u63db\u3048',D:'\u53e5\u52d5\u8a5e | \u548c\u2192\u82f1'};
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function eA(s){return String(s).replace(/'/g,'&#39;');}
function bfy(s){return esc(s).replace(/____/g,'<span class="blank">\u2003\u2003\u2003\u2003\u2003\u2003</span>');}
function render(){
  if(ST.cur>=20){stopQTimer();renderResult();return;}
  const q=ST.qs[ST.cur];ST.done=false;updateHdr();
  const au=q.audio;
  const abtn=`<button class="abtn" onclick="playClip('${au.file}',${au.start},${au.end})"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>\u25b6 \u4f8b\u6587\u3092\u8074\u304f</button>`;
  let qtxt='';
  if(q.sec==='D'){const SEP='\n\u2192 ';const idx=q.q.indexOf(SEP);const jpP=idx>=0?q.q.substring(0,idx):q.q;const enP=idx>=0?q.q.substring(idx+SEP.length):'';qtxt=`<div class="qtext-jp">${esc(jpP)}</div><div class="qtext-en">\u2192 ${bfy(enP)}</div>`;}
  else if(q.sec==='C'){const lines=q.q.split('\n');qtxt=`<div class="qtext">${lines.map(l=>bfy(l)).join('<br>')}</div>`;}
  else{qtxt=`<div class="qtext">${bfy(q.q)}</div>`;}
  const guide=(q.sec==='B')?`<div class="qtext-guide">\ud83d\udcdd ${esc(q.jp)}</div>`:'';
  const timerBar=(q.sec!=='A')?`<div class="qtimer-wrap"><div class="qtimer-bar-bg"><div class="qtimer-bar" id="qtbar" style="width:100%"></div></div><div class="qtimer-num" id="qtnum">30s</div></div>`:'';
  let inp='';
  if(q.sec==='A'){const opts=shuffle([...q.opts]);inp=`<div class="choices">${opts.map((o,i)=>`<button class="cbtn" onclick="pick(this,'${eA(o)}')" data-v="${eA(o)}"><span class="lbl">${['\u2460','\u2461','\u2462','\u2463'][i]}</span>${esc(o)}</button>`).join('')}</div>`;}
  else{const hp=(q.hint&&q.hint.trim())?`<button class="hbtn" id="hbtn" onclick="showHint()">\ud83d\udca1 \u30d2\u30f3\u30c8\u3092\u898b\u308b</button><div class="hbox" id="hbox">\u30d2\u30f3\u30c8: ${esc(q.hint)}</div>`:'';inp=`<div class="iarea">${timerBar}<div class="irow"><input class="tinput" id="ai" placeholder="\u7b54\u3048\u3092\u5165\u529b\u2026" onkeydown="if(event.key==='Enter')sub()"><button class="sbtn" id="sb" onclick="sub()">\u78ba\u8a8d</button></div>${hp}</div>`;}
  document.getElementById('main').innerHTML=`<div class="qcard"><div class="qmeta"><span class="qnum-badge ${q.sec}">Q${ST.cur+1}/20</span><span class="qtype-lbl">${STYPE[q.sec]}</span></div>${qtxt}${guide}${abtn}${inp}<div class="fb" id="fb"></div><button class="nxtbtn" id="nb" onclick="nxt()">\u6b21\u306e\u554f\u984c \u2192</button></div>`;
  if(q.sec!=='A'){const i=document.getElementById('ai');if(i)setTimeout(()=>i.focus(),80);if(q.hint&&q.hint.trim()){const h=document.getElementById('hbtn');if(h)h.style.display='block';}setTimeout(()=>startQTimer(q),100);}
}
function showHint(){const b=document.getElementById('hbtn'),h=document.getElementById('hbox');if(b)b.style.display='none';if(h)h.style.display='block';}
function pick(btn,sel){
  if(ST.done)return;ST.done=true;const q=ST.qs[ST.cur];
  document.querySelectorAll('.cbtn').forEach(b=>{b.disabled=true;if(b.dataset.v===q.a)b.classList.add('ok');});
  const ok=(sel===q.a)||(q.alts&&q.alts.length&&q.alts.includes(sel));
  btn.classList.remove('ok');btn.classList.add(ok?'ok':'ng');
  if(ok){ST.sc[q.sec]++;ST.ok++;}else ST.ng++;showFB(ok,q);
}
function norm(s){return s.trim().toLowerCase().replace(/[\u3000\s]+/g,' ').replace(/[\uff01-\uff5e]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/[.,!?\u3002\u3001\u2026\/]/g,'').trim();}
function checkAns(input,q){const ni=norm(input);if(ni===norm(q.a))return true;if(q.alts&&q.alts.length&&q.alts.some(alt=>norm(alt)===ni))return true;return false;}
function sub(){if(ST.done)return;const i=document.getElementById('ai');if(!i||!i.value.trim())return;stopQTimer();ST.done=true;const q=ST.qs[ST.cur];const ok=checkAns(i.value,q);i.disabled=true;i.classList.add(ok?'ok':'ng');const sb=document.getElementById('sb');if(sb)sb.disabled=true;if(ok){ST.sc[q.sec]++;ST.ok++;}else ST.ng++;showFB(ok,q);}
function showFB(ok,q,timeout=false){
  if(ok)playClip(q.audio.file,q.audio.start,q.audio.end);
  const fb=document.getElementById('fb');fb.className='fb '+(ok?'ok':'ng');fb.style.display='block';
  const mk=ok?'\u2713 \u6b63\u89e3':(timeout?'\u23f0 \u6642\u9593\u5207\u308c':'\u2717 \u4e0d\u6b63\u89e3');
  const ansDisp=q.alts&&q.alts.length?[q.a,...q.alts].join(' / '):q.a;
  fb.innerHTML=`<div class="fb-tabs"><div class="fbtab active" id="ft-ans" onclick="fbTab('ans')">\u6b63\u89e3\u3068\u89e3\u8aac</div><div class="fbtab" id="ft-jp" onclick="fbTab('jp')">\u4f8b\u6587\u30fb\u65e5\u672c\u8a9e\u8a33</div></div><div class="fbc show" id="fc-ans"><div class="fb-ans-row">${mk}\u3000\u6b63\u89e3\uff1a<span class="fb-ans">${esc(ansDisp)}</span></div><div class="fb-note">${esc(q.n)}</div></div><div class="fbc" id="fc-jp"><div class="fb-jp">${esc(q.jp)}</div></div>`;
  document.getElementById('nb').style.display='block';
  document.getElementById('sc-ok').textContent=ST.ok;document.getElementById('sc-ng').textContent=ST.ng;
}
function fbTab(t){['ans','jp'].forEach(x=>{document.getElementById('ft-'+x).classList.toggle('active',x===t);document.getElementById('fc-'+x).classList.toggle('show',x===t);});}
function nxt(){stopQTimer();ST.cur++;ST.done=false;render();}
function renderResult(){
  document.getElementById('pf').style.width='100%';document.getElementById('sc-pos').textContent='\u5b8c\u4e86\uff01';
  const e=Math.floor((Date.now()-ST.t0)/1000),mm=String(Math.floor(e/60)).padStart(2,'0'),ss=String(e%60).padStart(2,'0');
  const g=getGrade(ST.ok);
  document.getElementById('main').innerHTML=
    `<div class="scard">
      <div class="s-grade" style="color:${g.color}">${g.emoji} ${g.grade}</div>
      <div class="s-comment" style="color:${g.color}">${g.comment}</div>
      <div class="sbig">${ST.ok}</div>
      <div class="slbl">/ 20\u554f\u6b63\u89e3 &nbsp;\u23f1 ${mm}:${ss}</div>
      <div class="ssecs">
        <div class="ssec A"><div class="sn">Section A<br>4\u62e9</div><div class="sv">${ST.sc.A}/5</div></div>
        <div class="ssec B"><div class="sn">Section B<br>\u9023\u8a9e\u88dc\u5145</div><div class="sv">${ST.sc.B}/5</div></div>
        <div class="ssec C"><div class="sn">Section C<br>\u8a00\u3044\u63db\u3048</div><div class="sv">${ST.sc.C}/5</div></div>
        <div class="ssec D"><div class="sn">Section D<br>\u548c\u2192\u82f1</div><div class="sv">${ST.sc.D}/5</div></div>
      </div>
      <button class="rbtn p" onclick="init()">\ud83d\udd00 \u5225\u306e20\u554f\u306b\u6311\u6226</button>
      <button class="rbtn s" onclick="init()">\u3082\u3046\u4e00\u5ea6</button>
    </div>`;
}
setInterval(()=>{if(ST.cur<20){const e=Math.floor((Date.now()-ST.t0)/1000);document.getElementById('tmr').textContent=Math.floor(e/60)+':'+(e%60<10?'0':'')+(e%60);}},1000);
init();
</script>
</body>
